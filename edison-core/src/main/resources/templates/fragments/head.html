<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:fragment="head">
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->

    <title th:text="${@applicationInfo.title}">Edison µService</title>

    <link th:if="${not #strings.isEmpty(faviconUrl)}" rel="icon" th:href="${faviconUrl}"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>

    <style>
        [data-bs-theme="light"] {
            --bs-primary-bg-subtle: #9ec5fe;
        }

        [data-bs-theme="dark"] {
            --bs-primary-bg-subtle: #0a58ca;
        }

        [data-bs-theme="dark"] .d-only-light {
            display: none !important;
        }

        [data-bs-theme="light"] .d-only-dark {
            display: none !important;
        }

        .navbar + * {
            /* Equivalent to mt-4 */
            margin-top: 1.5rem;
        }
    </style>

    <script th:src="@{|${edisonManagementBasePath}/js/themeInit.js|}"></script>

</head>
<body>
</body>
</html>

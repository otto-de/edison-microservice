<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<ul class="navbar-nav me-auto mb-2 mb-lg-0" th:with="url=${requestURI}"
    th:fragment="main">
    <li th:each="item : ${@mainNavBar.items}" class="nav-item">
        <a class="nav-link" th:classappend="${url.endsWith('/') ? 'active' : ''}" th:href="@{/}"
           th:text="${item.title}"/>
    </li>
</ul>
</body>
</html>
